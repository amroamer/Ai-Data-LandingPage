server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Admin product edits ship base64-encoded screenshots (up to 1.5MB
    # each × 4 in the form) and PPT files (up to 25MB) inside the JSON
    # body. Default nginx cap is 1MB which 413s these requests; 50MB is
    # comfortably above the worst case while still rejecting outliers
    # an attacker might throw at the endpoint.
    client_max_body_size 50M;

    location /auth/api/ {
        proxy_pass http://auth-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Match the body-size cap so nginx doesn't truncate mid-stream
        # when forwarding the larger admin payloads upstream.
        proxy_request_buffering off;
    }

    location /ai-data/ {
        try_files $uri $uri/ /ai-data/index.html;
    }

    location /ai-data {
        return 301 /ai-data/;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
}
