<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    Favicon for the KPMG Digital Foundation landing page. Square 32x32
    so browsers can rasterise it cleanly to 16x16 / 32x32 / 48x48 tabs,
    bookmarks, and Apple touch icons. Brand color #00338d matches the
    `--color-kpmg` token in src/index.css; replace this file with an
    official PNG/ICO from the brand assets repo when one is available.
  -->
  <rect width="32" height="32" rx="6" fill="#00338d"/>
  <text
    x="16"
    y="23"
    text-anchor="middle"
    font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    font-weight="800"
    fill="#ffffff"
    letter-spacing="-0.5"
  >K</text>
</svg>
